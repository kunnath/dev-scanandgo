<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#1a73e8">
  <link rel="icon" type="image/jpeg" href="/poyaloo-icon.jpg">
  <title>Reset Password – ScanAndGo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #1a73e8, #0d47a1);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
      -webkit-font-smoothing: antialiased;
    }
    /* ── Outer container ── */
    .auth-container { width: 100%; max-width: 400px; }
    /* ── Header: icon + brand (matches homepage auth-header) ── */
    .auth-header { text-align: center; margin-bottom: 24px; }
    .auth-icon { margin-bottom: 12px; }
    .auth-icon-img {
      width: 64px; height: 64px;
      object-fit: contain;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    }
    .auth-header h1 {
      font-size: 28px; font-weight: 700;
      color: #f57c00; /* brand-orange – same as homepage */
      letter-spacing: -0.3px;
    }
    .auth-header p { color: rgba(255,255,255,0.82); margin-top: 5px; font-size: 14px; }
    /* ── White card ── */
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      padding: 2rem 1.75rem 1.75rem;
    }
    .card-title  { font-size: 1.1rem; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
    .card-subtitle { color: #6b7280; font-size: 0.85rem; margin-bottom: 1.5rem; }
    label { display: block; font-size: 0.82rem; font-weight: 600; color: #374151; margin-bottom: 5px; }
    .input-wrap { position: relative; margin-bottom: 0.875rem; }
    input[type="password"], input[type="text"] {
      width: 100%;
      padding: 0.65rem 2.4rem 0.65rem 0.875rem;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: inherit;
      color: #1a1a2e;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      background: #fff;
    }
    input:focus { border-color: #1a73e8; box-shadow: 0 0 0 3px rgba(26,115,232,0.12); }
    .toggle-eye {
      position: absolute; right: 10px; top: 50%;
      transform: translateY(-50%);
      cursor: pointer; color: #9ca3af; font-size: 1rem; user-select: none; line-height: 1;
    }
    .strength-bar {
      height: 4px; border-radius: 4px;
      background: #e5e7eb;
      margin: -0.5rem 0 0.875rem;
      overflow: hidden;
    }
    .strength-bar-fill { height: 100%; width: 0; border-radius: 4px; transition: width 0.3s, background 0.3s; }
    .rules {
      background: #f5f7fa; border: 1px solid #e5e7eb;
      border-radius: 10px; padding: 0.7rem 1rem;
      margin-bottom: 1.1rem; font-size: 0.78rem;
      color: #4b5563; list-style: none;
    }
    .rules li { padding: 2px 0 2px 1.4rem; position: relative; }
    .rules li::before { content: '✗'; position: absolute; left: 0; color: #d1d5db; font-size: 0.75rem; }
    .rules li.ok::before { content: '✓'; color: #0d9e5e; }
    .rules li.ok  { color: #0d9e5e; }
    .rules li.fail { color: #9ca3af; }
    /* ── Button: orange gradient matching homepage .btn-primary ── */
    button {
      width: 100%; padding: 0.8rem;
      background: linear-gradient(135deg, #e65100, #f57c00);
      color: #fff; border: none; border-radius: 10px;
      font-size: 1rem; font-weight: 700; font-family: inherit;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(230,81,0,0.25);
      transition: opacity 0.2s, box-shadow 0.2s;
      letter-spacing: 0.2px;
    }
    button:hover:not(:disabled) { opacity: 0.92; box-shadow: 0 4px 18px rgba(230,81,0,0.35); }
    button:disabled { background: #bdbdbd; box-shadow: none; cursor: not-allowed; }
    .msg {
      margin-top: 1rem; font-size: 0.85rem;
      padding: 0.7rem 1rem; border-radius: 8px;
      display: none; line-height: 1.5;
    }
    .msg.success { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
    .msg.error   { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
    .back-link {
      display: block; text-align: center; margin-top: 1.1rem;
      font-size: 0.875rem; color: #1a73e8; text-decoration: none; font-weight: 500;
    }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="auth-container">

  <!-- Header – same structure as homepage #auth-screen .auth-header -->
  <div class="auth-header">
    <div class="auth-icon">
      <img src="/poyaloo-icon.jpg" alt="ScanAndGo logo" class="auth-icon-img">
    </div>
    <h1>ScanAndGo</h1>
    <p>Track buses. Buy tickets. Scan &amp; board.</p>
  </div>

  <!-- White card -->
  <div class="card">
    <p class="card-title">🔒 Set New Password</p>
    <p class="card-subtitle">Create a strong password for your account.</p>

    <label for="password">New Password</label>
    <div class="input-wrap">
      <input type="password" id="password" placeholder="Enter new password" oninput="checkRules()" autocomplete="new-password" />
      <span class="toggle-eye" onclick="toggleVisibility('password', this)">👁</span>
    </div>
    <div class="strength-bar"><div class="strength-bar-fill" id="strengthFill"></div></div>

    <ul class="rules" id="ruleList">
      <li id="r-len"   class="fail">At least 8 characters</li>
      <li id="r-upper" class="fail">At least 1 uppercase letter (A–Z)</li>
      <li id="r-num"   class="fail">At least 1 number (0–9)</li>
      <li id="r-spec"  class="fail">At least 1 special character (!@#$…)</li>
    </ul>

    <label for="confirm">Confirm New Password</label>
    <div class="input-wrap">
      <input type="password" id="confirm" placeholder="Re-enter new password" autocomplete="new-password" />
      <span class="toggle-eye" onclick="toggleVisibility('confirm', this)">👁</span>
    </div>

    <button id="submitBtn" onclick="resetPassword()" disabled>Reset Password</button>
    <div class="msg" id="msg"></div>
    <a class="back-link" href="/">← Back to Login</a>
  </div>

</div>

<script>
  function getToken() {
    return new URLSearchParams(window.location.search).get('token');
  }

  function toggleVisibility(id, eye) {
    const input = document.getElementById(id);
    if (input.type === 'password') { input.type = 'text'; eye.textContent = '🙈'; }
    else { input.type = 'password'; eye.textContent = '👁'; }
  }

  function checkRules() {
    const val = document.getElementById('password').value;
    const checks = {
      'r-len':   val.length >= 8,
      'r-upper': /[A-Z]/.test(val),
      'r-num':   /[0-9]/.test(val),
      'r-spec':  /[!@#$%^&*()\-_=+\[\]{};:'",.<>/?\\|`~]/.test(val),
    };
    let passed = 0;
    for (const [id, ok] of Object.entries(checks)) {
      const el = document.getElementById(id);
      el.className = ok ? 'ok' : 'fail';
      if (ok) passed++;
    }
    // Strength bar
    const fill = document.getElementById('strengthFill');
    const pct = (passed / 4) * 100;
    fill.style.width = pct + '%';
    fill.style.background = pct <= 25 ? '#ef4444' : pct <= 50 ? '#f59e0b' : pct <= 75 ? '#3b82f6' : '#10b981';

    const allOk = Object.values(checks).every(Boolean);
    document.getElementById('submitBtn').disabled = !allOk;
    return allOk;
  }

  async function resetPassword() {
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm').value;
    const msgEl    = document.getElementById('msg');
    msgEl.style.display = 'none';

    if (!checkRules()) return;

    if (password !== confirm) {
      showMsg('Passwords do not match. Please re-enter.', 'error');
      return;
    }

    const token = getToken();
    if (!token) {
      showMsg('Invalid reset link. Please request a new password reset.', 'error');
      return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Resetting…';

    try {
      const BACKEND_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.hostname.startsWith('192.168.'))
        ? ''
        //: 'https://scanandgo-mhzn.onrender.com';
        : 'https://scanandgo-api-s4y4.onrender.com';
      const res = await fetch(`${BACKEND_URL}/api/auth/reset-password/${token}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password }),
      });
      const data = await res.json();
      if (res.ok) {
        showMsg('✅ ' + data.message + ' Redirecting to login in 3 seconds…', 'success');
        setTimeout(() => window.location.href = '/', 3000);
      } else {
        showMsg(data.error || 'Something went wrong. Please try again.', 'error');
        btn.disabled = false;
        btn.textContent = 'Reset Password';
      }
    } catch {
      showMsg('Network error. Please check your connection and try again.', 'error');
      btn.disabled = false;
      btn.textContent = 'Reset Password';
    }
  }

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + type;
    el.style.display = 'block';
  }

  // If no token in URL, show error immediately
  if (!getToken()) {
    document.querySelector('button').disabled = true;
    showMsg('This reset link is invalid or has already been used. Please request a new one.', 'error');
  }
</script>
</body>
</html>
